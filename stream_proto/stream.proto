syntax = "proto3";
option go_package = "/proto";
//普通rpc，一问一答
service Simple{
  rpc Fun(Request)returns(Response){}
}
message Request{
  string name = 1;
}
message Response{
  string text= 1;
}
message FileResponse{
  string file_name = 1;
  bytes content = 2;
}
service ServiceStream{
  rpc Fun(Request)returns(stream Response){}
  rpc DownLoadFile(Request)returns(stream FileResponse){}
}
message FileRequest{
  string file_name = 1;
  bytes content = 2;
}
service Clientstream{
  rpc UploadFile(stream FileRequest)returns(Response){}
}

//protoc -I . --go_out=. --go-grpc_out=. stream.proto